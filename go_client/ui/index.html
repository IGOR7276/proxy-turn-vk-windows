<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WDTT VPN Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;height:100vh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.header{background:#161b22;padding:12px 20px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header h1{font-size:18px;color:#f0f6fc;font-weight:600}
.header .status{font-size:12px;padding:3px 10px;border-radius:12px;background:#21262d;color:#8b949e}
.header .status.running{background:#1b3d2b;color:#3fb950}
.header .status.connecting{background:#3d2e1b;color:#d29922}
.content{display:flex;flex:1;overflow:hidden}
.left{width:420px;min-width:420px;border-right:1px solid #30363d;overflow-y:auto;padding:16px 20px;flex-shrink:0}
.right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.right .tabs{display:flex;border-bottom:1px solid #30363d;flex-shrink:0}
.right .tabs button{padding:8px 20px;background:0;border:0;color:#8b949e;cursor:pointer;font-size:13px;border-bottom:2px solid transparent}
.right .tabs button.active{color:#f0f6fc;border-bottom-color:#58a6ff}
.right .tabs button:hover{color:#c9d1d9}
.right .logs{flex:1;overflow-y:auto;padding:12px 16px;font-family:'Cascadia Code','JetBrains Mono','Consolas',monospace;font-size:12px;line-height:1.5}
.right .logs .line{white-space:pre-wrap;word-break:break-all}
.right .logs .line:nth-child(even){background:#080c10}
.right .stats{display:none;padding:16px;gap:16px;flex-wrap:wrap;align-content:flex-start}
.right .stats.show{display:flex}
.stat-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;min-width:160px;text-align:center}
.stat-card .value{font-size:28px;font-weight:700;color:#f0f6fc}
.stat-card .label{font-size:12px;color:#8b949e;margin-top:4px}
label{display:block;font-size:12px;color:#8b949e;margin-top:12px;margin-bottom:4px}
input,select{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;outline:0}
input:focus,select:focus{border-color:#58a6ff}
input::placeholder{color:#484f58}
.row{display:flex;gap:12px}
.row>*{flex:1}
.btn{padding:8px 20px;border-radius:6px;border:0;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary{background:#238636;color:#fff}
.btn-primary:hover{background:#2ea043}
.btn-primary:disabled{background:#1b3d2b;color:#3fb950;opacity:.5;cursor:not-allowed}
.btn-danger{background:#da3633;color:#fff}
.btn-danger:hover{background:#f85149}
.btn-danger:disabled{background:#3d1b1b;color:#f85149;opacity:.5;cursor:not-allowed}
.btn-outline{background:0;color:#c9d1d9;border:1px solid #30363d}
.btn-outline:hover{border-color:#8b949e}
.btn-sm{padding:4px 12px;font-size:12px}
.btn-group{display:flex;gap:8px;margin-top:16px}
.profile-row{display:flex;gap:8px;align-items:center}
.profile-row select{flex:1}
input[type=checkbox]{width:auto;margin-right:6px;accent-color:#58a6ff}
.checkbox-label{display:flex;align-items:center;gap:6px;font-size:13px;color:#c9d1d9;margin-top:12px;cursor:pointer}
.error{color:#f85149;font-size:12px;margin-top:4px}
.success{color:#3fb950;font-size:12px;margin-top:4px}
@media(max-width:900px){.content{flex-direction:column}.left{width:100%;min-width:0;border-right:0;border-bottom:1px solid #30363d;max-height:50%}}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#484f58}
</style>
</head>
<body>
<div class="app">
<div class="header">
<h1>WDTT VPN</h1>
<span class="status" id="statusBadge">Остановлен</span>
<div style="flex:1"></div>
<span id="logCount" style="font-size:12px;color:#484f58">0 строк</span>
</div>
<div class="content">
<div class="left">
<div class="profile-row">
<select id="profileSelect"><option value="">-- Новый профиль --</option></select>
<button class="btn btn-outline btn-sm" onclick="saveProfile()">💾</button>
<button class="btn btn-outline btn-sm" onclick="deleteProfile()">🗑</button>
</div>
<label for="profileName">Имя профиля</label>
<input id="profileName" placeholder="Мой профиль">
<div class="row">
<div>
<label for="peer">Peer (адрес:порт VPS)</label>
<input id="peer" placeholder="ip:port VPS">
</div>
<div>
<label for="vkHash">VK Hash</label>
<input id="vkHash" placeholder="хэш VK звонка">
</div>
</div>
<label for="password">Пароль</label>
<input id="password" type="password" placeholder="пароль подключения">
<div class="row">
<div>
<label for="numWorkers">Воркеров</label>
<select id="numWorkers">
<option value="9">9</option>
<option value="18">18</option>
<option value="27">27</option>
<option value="36" selected>36</option>
<option value="54">54</option>
<option value="72">72</option>
<option value="108">108</option>
</select>
</div>
<div>
<label for="clientIds">Client IDs</label>
<input id="clientIds" placeholder="ID клиентов VK через запятую">
</div>
</div>
<div class="row">
<div>
<label for="fingerprint">Fingerprint</label>
<select id="fingerprint">
<option value="chrome">Chrome</option>
<option value="safari">Safari</option>
<option value="ios">iOS</option>
<option value="android">Android</option>
<option value="firefox">Firefox</option>
</select>
</div>
<div>
<label for="captchaMode">Captcha</label>
<select id="captchaMode">
<option value="auto">Auto</option>
<option value="wv">WBV (WebView)</option>
<option value="rjs">RJS</option>
</select>
</div>
</div>
<label class="checkbox-label">
<input type="checkbox" id="useWindowsWG" checked>
Windows WireGuard интерфейс (-windows-wg)
</label>
<div id="wgOptions" style="display:block">
<label for="wgInterface">Имя WG интерфейса</label>
<input id="wgInterface" value="WDTT">
</div>
<label for="deviceId">Device ID</label>
<input id="deviceId" placeholder="ID устройства">
<label class="checkbox-label">
<input type="checkbox" id="autoReconnect" checked>
Автоподключение при запуске
</label>
<div class="btn-group">
<button class="btn btn-primary" id="btnConnect" onclick="connect()">▶ Подключиться</button>
<button class="btn btn-danger" id="btnDisconnect" onclick="disconnect()" disabled>■ Отключиться</button>
</div>
<div id="statusMsg"></div>
</div>
<div class="right">
<div class="tabs">
<button class="active" onclick="showTab('logs',this)">📋 Логи</button>
<button onclick="showTab('stats',this)">📊 Статистика</button>
</div>
<div class="logs" id="logContainer"></div>
<div class="stats" id="statsContainer">
<div class="stat-card"><div class="value" id="statActive">0</div><div class="label">Активных воркеров</div></div>
<div class="stat-card"><div class="value" id="statTraffic">0.00</div><div class="label">Трафик (МБ)</div></div>
<div class="stat-card"><div class="value" id="statUptime">00:00</div><div class="label">Время работы</div></div>
<div class="stat-card"><div class="value" id="statProfile">—</div><div class="label">Текущий профиль</div></div>
</div>
</div>
</div>
</div>
<script>
let profiles=[];
let startTime=null;
let statusInterval=null;
let logFetchSince="";
async function api(method,url,body){
const opts={method,headers:{}};
if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body)}
const r=await fetch(url,opts);
if(!r.ok){const e=await r.text();throw new Error(e)}
if(method==='DELETE')return null;
if(r.headers.get('content-type')?.includes('json'))return r.json();
return r.text()
}
async function loadProfiles(){
try{
profiles=await api('GET','/api/profiles');
const sel=document.getElementById('profileSelect');
sel.innerHTML='<option value="">-- Новый профиль --</option>';
profiles.forEach(p=>{
const o=document.createElement('option');
o.value=p.Name;o.textContent=p.Name+(p.AutoConnect?' ★':'');
sel.appendChild(o)
})
}catch(e){}
}
function loadProfile(name){
const p=profiles.find(x=>x.Name===name);
if(!p)return;
document.getElementById('profileName').value=p.Name||'';
document.getElementById('peer').value=p.Peer||'';
document.getElementById('vkHash').value=p.VkHash||'';
document.getElementById('password').value=p.Password||'';
document.getElementById('numWorkers').value=p.NumWorkers||36;
document.getElementById('clientIds').value=p.ClientIds||'';
document.getElementById('fingerprint').value=p.Fingerprint||'chrome';
document.getElementById('captchaMode').value=p.CaptchaMode||'auto';
document.getElementById('useWindowsWG').checked=p.UseWindowsWG!==false;
document.getElementById('wgInterface').value=p.WGInterface||'WDTT';
document.getElementById('deviceId').value=p.DeviceId||'unknown';
document.getElementById('autoReconnect').checked=p.AutoConnect||false;
}
function currentProfile(){
return{
Name:document.getElementById('profileName').value,
Peer:document.getElementById('peer').value,
VkHash:document.getElementById('vkHash').value,
Password:document.getElementById('password').value,
NumWorkers:parseInt(document.getElementById('numWorkers').value)||36,
ClientIds:document.getElementById('clientIds').value,
Fingerprint:document.getElementById('fingerprint').value,
CaptchaMode:document.getElementById('captchaMode').value,
UseWindowsWG:document.getElementById('useWindowsWG').checked,
WGInterface:document.getElementById('wgInterface').value,
DeviceId:document.getElementById('deviceId').value,
AutoConnect:document.getElementById('autoReconnect').checked
}
}
async function saveProfile(){
const p=currentProfile();
if(!p.Name){setMsg('Укажите имя профиля','error');return}
try{
await api('POST','/api/profiles',p);
await loadProfiles();
document.getElementById('profileSelect').value=p.Name;
setMsg('Профиль сохранён','success')
}catch(e){setMsg('Ошибка: '+e.message,'error')}
}
async function deleteProfile(){
const name=document.getElementById('profileSelect').value;
if(!name)return;
if(!confirm('Удалить профиль "'+name+'"?'))return;
try{
await api('DELETE','/api/profiles/'+encodeURIComponent(name));
await loadProfiles();
setMsg('Профиль удалён','success')
}catch(e){setMsg('Ошибка: '+e.message,'error')}
}
document.getElementById('profileSelect').addEventListener('change',function(){
if(this.value)loadProfile(this.value)
});
function log(msg){
const c=document.getElementById('logContainer');
const d=document.createElement('div');d.className='line';d.textContent=msg;
c.appendChild(d);
c.scrollTop=c.scrollHeight;
document.getElementById('logCount').textContent=c.children.length+' строк'
}
async function connect(){
const p=currentProfile();
if(!p.Peer||!p.VkHash||!p.Password){setMsg('Заполните Peer, VK Hash и Пароль','error');return}
setBusy(true);
try{
await api('POST','/api/start',p);
setMsg('Подключение...','success');
startTime=Date.now();
pollStatus();
pollLogs();
}catch(e){setMsg('Ошибка: '+e.message,'error');setBusy(false)}
}
async function disconnect(){
try{
await api('POST','/api/stop');
setMsg('Отключено','success');
setBusy(false);
startTime=null;
if(statusInterval){clearInterval(statusInterval);statusInterval=null}
updateStatBadge()
}catch(e){setMsg('Ошибка: '+e.message,'error')}
}
function setBusy(running){
document.getElementById('btnConnect').disabled=running;
document.getElementById('btnDisconnect').disabled=!running;
const badge=document.getElementById('statusBadge');
if(running){badge.textContent='Подключение...';badge.className='status connecting'}
else{badge.textContent='Остановлен';badge.className='status'}
}
async function pollStatus(){
try{
const s=await api('GET','/api/status');
const badge=document.getElementById('statusBadge');
if(s.running){
badge.textContent='Работает ('+s.activeConnections+' ворк.)';
badge.className='status running';
document.getElementById('btnConnect').disabled=true;
document.getElementById('btnDisconnect').disabled=false;
document.getElementById('statActive').textContent=s.activeConnections;
document.getElementById('statTraffic').textContent=s.trafficMB;
if(startTime){
const sec=Math.floor((Date.now()-startTime)/1000);
const m=String(Math.floor(sec/60)).padStart(2,'0');
const secs=String(sec%60).padStart(2,'0');
document.getElementById('statUptime').textContent=m+':'+secs
}
document.getElementById('statProfile').textContent=document.getElementById('profileName').value||'—';
setTimeout(pollStatus,2000)
}else{
setBusy(false);
startTime=null
}
if(!statusInterval)statusInterval=setTimeout(pollStatus,5000)
}catch(e){setTimeout(pollStatus,5000)}
}
async function pollLogs(){
try{
const lines=await api('GET','/api/logs');
if(lines&&Array.isArray(lines)){
lines.forEach(l=>log(l));
if(lines.length>0)logFetchSince=lines[lines.length-1]
}
}catch(e){}
setTimeout(pollLogs,1000)
}
function showTab(name,btn){
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
document.getElementById('logContainer').style.display=name==='logs'?'block':'none';
document.getElementById('statsContainer').classList.toggle('show',name==='stats')
}
function setMsg(text,type){
const el=document.getElementById('statusMsg');
el.textContent=text;el.className=type||''
}
// Init
loadProfiles();
// Check auto-start
(async()=>{
try{
const s=await api('GET','/api/status');
if(s.running){
setBusy(true);
startTime=Date.now();
pollStatus();
pollLogs()
}
}catch(e){}
})();
</script>
</body>
</html>
